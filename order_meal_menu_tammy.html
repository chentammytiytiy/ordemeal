<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐點與飲料維護 - 點餐系統後台管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #10b981;
            --secondary-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg-dark: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.95);
            --modal-bg: rgba(255, 255, 255, 0.98);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #ffffff;
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
        }

        .dashboard-layout { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.85); box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); text-align: center; }
        .sidebar-header h2 {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(to right, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: transparent;
        }
        .sidebar-menu { list-style: none; flex: 1; }
        .sidebar-menu li { margin-bottom: 0.5rem; }
        .menu-item {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem;
            color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: var(--transition);
        }
        .menu-item:hover { background: rgba(0, 0, 0, 0.03); color: var(--text-main); }
        .menu-item.active { background: rgba(99, 102, 241, 0.15); color: var(--primary); border-right: 3px solid var(--primary); }
        .menu-item svg { width: 20px; height: 20px; }

        .main-content { flex: 1; padding: 2rem; height: 100vh; overflow-y: auto; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .header h1 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(to right, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: transparent;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px; border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        
        .card-header {
            padding: 1.25rem 1.5rem; background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid var(--border); font-size: 1.1rem; font-weight: 600;
            display: flex; justify-content: space-between; align-items: center;
        }

        .card-body { padding: 1.5rem; flex: 1; overflow-y: auto; max-height: 60vh; }

        .item-list { list-style: none; }
        .item-list li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px;
            margin-bottom: 0.5rem; transition: var(--transition);
        }
        .item-list li:hover { background: rgba(0,0,0,0.015); border-color: var(--primary); }
        
        .btn {
            padding: 0.5rem 1rem; border-radius: 8px; border: none; cursor: pointer;
            font-size: 0.9rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.5rem;
            transition: var(--transition);
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.85rem; }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .form-control {
            flex: 1; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.8); color: var(--text-main); font-size: 1rem; outline: none;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }

        @media (max-width: 768px) {
            .dashboard-layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 1rem; }
            .sidebar-menu { display: flex; flex-wrap: wrap; gap: 0.5rem; }
            .sidebar-menu li { margin: 0; }
            .grid-container { grid-template-columns: 1fr; }
            .main-content { height: auto; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>點餐系統後台</h2>
            </div>
            <ul class="sidebar-menu">
                <li>
                    <a href="order_meal_overview_tammy.html" class="menu-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        總覽
                    </a>
                </li>
                <li>
                    <a href="order_meal_back_ui_tammy.html" class="menu-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        點餐系統
                    </a>
                </li>
                <li>
                    <a href="order_meal_menu_tammy.html" class="menu-item active">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        品項維護
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="container">
                <header class="header">
                    <h1>餐點與飲料維護</h1>
                    <div class="user-profile">
                        <span style="color: var(--text-muted); font-size: 0.9rem;">以管理員身份登入</span>
                    </div>
                </header>

                <div class="grid-container">
                    <!-- Meals Card -->
                    <div class="card">
                        <div class="card-header">
                            <div>餐點 (EAT) 選單管理</div>
                        </div>
                        <div class="card-body">
                            <form class="add-form" id="addMealForm">
                                <input type="text" id="newMealInput" class="form-control" placeholder="輸入新的餐點名稱" required>
                                <button type="submit" class="btn btn-primary">新增</button>
                            </form>
                            <ul class="item-list" id="mealList">
                                <!-- Meals populated by JS -->
                            </ul>
                        </div>
                    </div>

                    <!-- Drinks Card -->
                    <div class="card">
                        <div class="card-header">
                            <div>飲料 (DRINK) 選單管理</div>
                        </div>
                        <div class="card-body">
                            <form class="add-form" id="addDrinkForm">
                                <input type="text" id="newDrinkInput" class="form-control" placeholder="輸入新的飲料名稱" required>
                                <button type="submit" class="btn btn-primary">新增</button>
                            </form>
                            <ul class="item-list" id="drinkList">
                                <!-- Drinks populated by JS -->
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const DEFAULT_MEALS = ["1.總匯特餐", "2.雞腿特餐", "3.排骨特餐", "4.叉燒特餐", "5.素食"];
        const DEFAULT_DRINKS = ["A.青四季春無糖微冰", "B.紅柚翡翠微糖微冰", "C.珍珠奶茶微糖微冰", "無"];
        
        let menuData = { meals: [], drinks: [] };

        function loadData() {
            const saved = localStorage.getItem('orderMealMenuItems_v1');
            if (saved) {
                menuData = JSON.parse(saved);
            } else {
                menuData = { meals: [...DEFAULT_MEALS], drinks: [...DEFAULT_DRINKS] };
                saveData();
            }
            renderLists();
        }

        function saveData() {
            localStorage.setItem('orderMealMenuItems_v1', JSON.stringify(menuData));
        }

        function renderLists() {
            const mealList = document.getElementById('mealList');
            mealList.innerHTML = menuData.meals.map((m, i) => `
                <li>
                    <span>${m}</span>
                    <button class="btn btn-sm btn-danger" onclick="deleteItem('meals', ${i})">刪除</button>
                </li>
            `).join('');

            const drinkList = document.getElementById('drinkList');
            drinkList.innerHTML = menuData.drinks.map((d, i) => `
                <li>
                    <span>${d}</span>
                    <button class="btn btn-sm btn-danger" onclick="deleteItem('drinks', ${i})">刪除</button>
                </li>
            `).join('');
        }

        function deleteItem(type, index) {
            if(confirm('確定要刪除這個品項嗎？')) {
                menuData[type].splice(index, 1);
                saveData();
                renderLists();
            }
        }

        document.getElementById('addMealForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('newMealInput');
            const val = input.value.trim();
            if(val && !menuData.meals.includes(val)) {
                menuData.meals.push(val);
                saveData();
                renderLists();
                input.value = '';
            } else if (menuData.meals.includes(val)) {
                alert('該餐點已存在');
            }
        });

        document.getElementById('addDrinkForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('newDrinkInput');
            const val = input.value.trim();
            if(val && !menuData.drinks.includes(val)) {
                menuData.drinks.push(val);
                saveData();
                renderLists();
                input.value = '';
            } else if (menuData.drinks.includes(val)) {
                alert('該飲料已存在');
            }
        });

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
