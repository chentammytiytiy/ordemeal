<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點餐系統後台管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #10b981;
            --secondary-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --modal-bg: rgba(15, 23, 42, 0.95);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.6;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Toolbar (Search & Add) */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .search-box svg {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
        }

        /* Buttons */
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-edit {
            background: transparent;
            color: #60a5fa;
            border: 1px solid #60a5fa;
            padding: 0.4rem 0.8rem;
        }
        .btn-edit:hover {
            background: #60a5fa;
            color: #0f172a;
        }

        .btn-delete {
            background: transparent;
            color: #f87171;
            border: 1px solid #f87171;
            padding: 0.4rem 0.8rem;
        }
        .btn-delete:hover {
            background: #f87171;
            color: white;
        }

        /* Table Card (Glassmorphism) */
        .table-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .action-cell {
            display: flex;
            gap: 0.5rem;
        }

        /* Empty State */
        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--modal-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            transform: translateY(-20px) scale(0.95);
            transition: var(--transition);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
        }

        .close-btn:hover {
            color: white;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            padding-right: 2.5rem;
        }

        select.form-control option {
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        /* Animations */
        @keyframes fadeInRow {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        tbody tr {
            animation: fadeInRow 0.3s ease forwards;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: none;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            tr {
                border-bottom: 1px solid var(--border);
                margin-bottom: 1rem;
            }
            td {
                border: none;
                position: relative;
                padding-left: 50%;
            }
            td:before {
                position: absolute;
                top: 50%;
                left: 1.5rem;
                transform: translateY(-50%);
                width: 45%;
                padding-right: 10px;
                white-space: nowrap;
                color: var(--text-muted);
                font-size: 0.85rem;
                font-weight: 600;
            }
            td:nth-of-type(1):before { content: "編號"; }
            td:nth-of-type(2):before { content: "姓名"; }
            td:nth-of-type(3):before { content: "餐點 (EAT)"; }
            td:nth-of-type(4):before { content: "飲料 (DRINK)"; }
            td:nth-of-type(5):before { content: "操作"; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>點餐系統後台管理</h1>
            <div class="user-profile">
                <span style="color: var(--text-muted); font-size: 0.9rem;">以管理員身份登入</span>
            </div>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="搜尋姓名、餐點或飲料...">
            </div>
            <button class="btn btn-primary" id="addBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                新增訂單
            </button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>編號</th>
                        <th>姓名</th>
                        <th>餐點 (EAT)</th>
                        <th>飲料 (DRINK)</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be populated here -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                找不到符合條件的資料
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="formModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">新增訂單</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="orderForm">
                <input type="hidden" id="orderId">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" class="form-control" required placeholder="請輸入姓名">
                </div>
                <div class="form-group">
                    <label for="meal">餐點 (EAT)</label>
                    <select id="meal" class="form-control" required>
                        <option value="" disabled selected>請選擇餐點</option>
                        <option value="1.總匯特餐">1.總匯特餐</option>
                        <option value="2.雞腿特餐">2.雞腿特餐</option>
                        <option value="3.排骨特餐">3.排骨特餐</option>
                        <option value="4.叉燒特餐">4.叉燒特餐</option>
                        <option value="5.素食">5.素食</option>
                        <option value="自行輸入">其他 (自行輸入)</option>
                    </select>
                </div>
                <div class="form-group" id="customMealGroup" style="display: none;">
                    <label for="customMeal">自訂餐點</label>
                    <input type="text" id="customMeal" class="form-control" placeholder="輸入其他餐點">
                </div>
                <div class="form-group">
                    <label for="drink">飲料 (DRINK)</label>
                    <select id="drink" class="form-control">
                        <option value="" disabled selected>請選擇飲料 (非必填)</option>
                        <option value="A.青四季春無糖微冰">A.青四季春無糖微冰</option>
                        <option value="B.紅柚翡翠微糖微冰">B.紅柚翡翠微糖微冰</option>
                        <option value="C.珍珠奶茶微糖微冰">C.珍珠奶茶微糖微冰</option>
                        <option value="無">無</option>
                        <option value="自行輸入">其他 (自行輸入)</option>
                    </select>
                </div>
                <div class="form-group" id="customDrinkGroup" style="display: none;">
                    <label for="customDrink">自訂飲料</label>
                    <input type="text" id="customDrink" class="form-control" placeholder="輸入其他飲料">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Initial Mock Data from Google Sheet
        const initialData = [
            { id: 1, name: "高念平", meal: "3.排骨特餐", drink: "A.青四季春無糖微冰" },
            { id: 2, name: "游國楷", meal: "3.排骨特餐", drink: "C.珍珠奶茶微糖微冰" },
            { id: 3, name: "謝楷評", meal: "2.雞腿特餐", drink: "B.紅柚翡翠微糖微冰" },
            { id: 4, name: "陳春惠", meal: "2.雞腿特餐", drink: "B.紅柚翡翠微糖微冰" },
            { id: 5, name: "薛仁奇", meal: "4.叉燒特餐", drink: "B.紅柚翡翠微糖微冰" },
            { id: 6, name: "劉道鈞", meal: "3.排骨特餐", drink: "C.珍珠奶茶微糖微冰" },
            { id: 7, name: "蔡恩傑", meal: "1.總匯特餐", drink: "B.紅柚翡翠微糖微冰" },
            { id: 8, name: "李國源", meal: "5.素食", drink: "A.青四季春無糖微冰" }
        ];

        // State Management
        let orders = [];
        let nextId = 1;

        // Initialize state
        function init() {
            const savedOrders = localStorage.getItem('orderMealData_v2');
            if (savedOrders) {
                orders = JSON.parse(savedOrders);
                nextId = orders.length > 0 ? Math.max(...orders.map(o => o.id)) + 1 : 1;
            } else {
                orders = [...initialData];
                nextId = 9;
                saveData();
            }
            renderTable();
            setupEventListeners();
        }

        // Save to LocalStorage to simulate persistence
        function saveData() {
            localStorage.setItem('orderMealData_v2', JSON.stringify(orders));
        }

        // Render Table
        function renderTable(filterText = '') {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';

            const filteredOrders = orders.filter(order => {
                const search = filterText.toLowerCase();
                return order.name.toLowerCase().includes(search) ||
                       order.meal.toLowerCase().includes(search) ||
                       (order.drink && order.drink.toLowerCase().includes(search));
            });

            if (filteredOrders.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                filteredOrders.forEach(order => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${order.id}</td>
                        <td><div style="font-weight: 500;">${order.name}</div></td>
                        <td>${order.meal}</td>
                        <td>${order.drink || '<span style="color: var(--text-muted)">-</span>'}</td>
                        <td class="action-cell">
                            <button class="btn btn-edit" onclick="editOrder(${order.id})">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                編輯
                            </button>
                            <button class="btn btn-delete" onclick="deleteOrder(${order.id})">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                刪除
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderTable(e.target.value);
        });

        // Modal Elements
        const modal = document.getElementById('formModal');
        const orderForm = document.getElementById('orderForm');
        const modalTitle = document.getElementById('modalTitle');
        const addBtn = document.getElementById('addBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // Custom Input Toggles
        const mealSelect = document.getElementById('meal');
        const customMealGroup = document.getElementById('customMealGroup');
        const customMealInput = document.getElementById('customMeal');

        const drinkSelect = document.getElementById('drink');
        const customDrinkGroup = document.getElementById('customDrinkGroup');
        const customDrinkInput = document.getElementById('customDrink');

        mealSelect.addEventListener('change', (e) => {
            if (e.target.value === '自行輸入') {
                customMealGroup.style.display = 'block';
                customMealInput.required = true;
            } else {
                customMealGroup.style.display = 'none';
                customMealInput.required = false;
            }
        });

        drinkSelect.addEventListener('change', (e) => {
            if (e.target.value === '自行輸入') {
                customDrinkGroup.style.display = 'block';
                customDrinkInput.required = true;
            } else {
                customDrinkGroup.style.display = 'none';
                customDrinkInput.required = false;
            }
        });

        function openModal(isEdit = false) {
            modal.classList.add('active');
            if (!isEdit) {
                modalTitle.textContent = '新增訂單';
                orderForm.reset();
                document.getElementById('orderId').value = '';
                customMealGroup.style.display = 'none';
                customDrinkGroup.style.display = 'none';
                customMealInput.required = false;
                customDrinkInput.required = false;
            }
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        addBtn.addEventListener('click', () => openModal(false));
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);

        // Close on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Form Submit
        orderForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const id = document.getElementById('orderId').value;
            const name = document.getElementById('name').value;
            
            let meal = mealSelect.value;
            if (meal === '自行輸入') meal = customMealInput.value;
            
            let drink = drinkSelect.value;
            if (drink === '自行輸入') drink = customDrinkInput.value;
            if (drink === '無') drink = '';

            if (id) {
                // Edit
                const index = orders.findIndex(o => o.id == id);
                if (index !== -1) {
                    orders[index] = { ...orders[index], name, meal, drink };
                    alert('資料修改成功！');
                }
            } else {
                // Add
                orders.push({ id: nextId++, name, meal, drink });
                alert('資料新增成功！');
            }

            saveData();
            renderTable(document.getElementById('searchInput').value);
            closeModal();
        });

        // Edit function
        window.editOrder = function(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;

            document.getElementById('orderId').value = order.id;
            document.getElementById('name').value = order.name;
            
            // Set Meal
            const mealOptions = Array.from(mealSelect.options).map(o => o.value);
            if (mealOptions.includes(order.meal)) {
                mealSelect.value = order.meal;
                customMealGroup.style.display = 'none';
                customMealInput.required = false;
            } else {
                mealSelect.value = '自行輸入';
                customMealGroup.style.display = 'block';
                customMealInput.required = true;
                customMealInput.value = order.meal;
            }

            // Set Drink
            const drinkVal = order.drink || '無';
            const drinkOptions = Array.from(drinkSelect.options).map(o => o.value);
            if (drinkOptions.includes(drinkVal)) {
                drinkSelect.value = drinkVal;
                customDrinkGroup.style.display = 'none';
                customDrinkInput.required = false;
            } else {
                drinkSelect.value = '自行輸入';
                customDrinkGroup.style.display = 'block';
                customDrinkInput.required = true;
                customDrinkInput.value = order.drink;
            }

            modalTitle.textContent = '編輯訂單 (編號: ' + order.id + ')';
            openModal(true);
        };

        // Delete function
        window.deleteOrder = function(id) {
            if (confirm('確定要刪除這筆訂單嗎？此動作無法復原。')) {
                orders = orders.filter(o => o.id !== id);
                saveData();
                renderTable(document.getElementById('searchInput').value);
            }
        };

        function setupEventListeners() {
            // Setup additional real-time validations or features here
        }

        // Initialize application
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
