<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點餐系統後台管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #10b981;
            --secondary-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg-dark: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.95);
            --modal-bg: rgba(255, 255, 255, 0.98);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #ffffff;
            background-image: none;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Dashboard Layout */
        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.85); box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-menu {
            list-style: none;
            flex: 1;
        }

        .sidebar-menu li {
            margin-bottom: 0.5rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: var(--transition);
        }

        .menu-item:hover {
            background: rgba(0, 0, 0, 0.03);
            color: var(--text-main);
        }

        .menu-item.active {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary);
            border-right: 3px solid var(--primary);
        }

        .menu-item svg {
            width: 20px;
            height: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem;
            height: 100vh;
            overflow-y: auto;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Toolbar (Search & Add) */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .search-box svg {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
        }

        /* Buttons */
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-main);
        }
        .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        .btn-edit {
            background: transparent;
            color: #60a5fa;
            border: 1px solid #60a5fa;
            padding: 0.4rem 0.8rem;
        }
        .btn-edit:hover {
            background: #60a5fa;
            color: #0f172a;
        }

        .btn-delete {
            background: transparent;
            color: #f87171;
            border: 1px solid #f87171;
            padding: 0.4rem 0.8rem;
        }
        .btn-delete:hover {
            background: #f87171;
            color: white;
        }

        /* Table Card (Glassmorphism) */
        .table-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: rgba(0, 0, 0, 0.03);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background: rgba(0, 0, 0, 0.015);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .action-cell {
            display: flex;
            gap: 0.5rem;
        }

        /* Empty State */
        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--modal-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            transform: translateY(-20px) scale(0.95);
            transition: var(--transition);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
        }

        .close-btn:hover {
            color: white;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            padding-right: 2.5rem;
        }

        select.form-control option {
            background-color: #ffffff;
            color: var(--text-main);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        /* Animations */
        @keyframes fadeInRow {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        tbody tr {
            animation: fadeInRow 0.3s ease forwards;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: none;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            tr {
                border-bottom: 1px solid var(--border);
                margin-bottom: 1rem;
            }
            td {
                border: none;
                position: relative;
                padding-left: 50%;
            }
            td:before {
                position: absolute;
                top: 50%;
                left: 1.5rem;
                transform: translateY(-50%);
                width: 45%;
                padding-right: 10px;
                white-space: nowrap;
                color: var(--text-muted);
                font-size: 0.85rem;
                font-weight: 600;
            }
            td:nth-of-type(1):before { content: "編號"; }
            td:nth-of-type(2):before { content: "日期"; }
            td:nth-of-type(3):before { content: "姓名"; }
            td:nth-of-type(4):before { content: "餐點 (EAT)"; }
            td:nth-of-type(5):before { content: "飲料 (DRINK)"; }
            td:nth-of-type(6):before { content: "操作"; }
        }

        /* Tags */
        .meal-tag {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            gap: 0.5rem;
            border-top: 1px solid var(--border);
        }
        
        .pagination button {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            background: white;
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .pagination button:hover:not(:disabled) {
            background: rgba(0,0,0,0.02);
            border-color: var(--primary);
        }
        
        .pagination button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .pagination button:disabled {
            background: rgba(0,0,0,0.02);
            color: var(--text-muted);
            cursor: not-allowed;
            border-color: var(--border);
        }
    </style>
</head>

        <main class="main-content">
            <div class="container">
        <header class="header">
            <h1>點餐系統後台管理</h1>
            <div class="user-profile">
                <span style="color: var(--text-muted); font-size: 0.9rem;">以管理員身份登入</span>
            </div>
        </header>

        <div class="toolbar">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <label for="dateFilter" style="font-size: 0.95rem; font-weight: 500;">用餐日期:</label>
                <input type="text" id="dateFilter" class="form-control" placeholder="選擇日期" style="width: 140px; padding: 0.5rem 1rem; border-radius: 999px; cursor: pointer; text-align: center;">
                <button id="confirmDateBtn" class="btn btn-primary" style="border-radius: 999px; padding: 0.5rem 1rem;">確認</button>

            </div>

        <div class="table-card">

                </thead>
                <tbody id="tableBody">
                    <!-- Data will be populated here -->
                </tbody>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="formModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">新增訂單</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="orderForm">
                <input type="hidden" id="orderId">
                <div class="form-group">
                    <label for="orderDate">用餐日期</label>
                    <input type="text" id="orderDate" class="form-control" placeholder="選擇日期" required style="cursor: pointer;">
                </div>
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" class="form-control" required placeholder="請輸入姓名">
                </div>
                <div class="form-group">
                    <label for="meal">餐點 (EAT)</label>
                    <input type="text" id="meal" class="form-control" required list="mealOptions" placeholder="請選擇或輸入餐點" autocomplete="off">
                    <datalist id="mealOptions">
                        <!-- Options generated dynamically -->
                    </datalist>
                </div>
                <div class="form-group">
                    <label for="drink">飲料 (DRINK)</label>
                    <input type="text" id="drink" class="form-control" list="drinkOptions" placeholder="請選擇或輸入飲料 (非必填)" autocomplete="off">
                    <datalist id="drinkOptions">
                        <!-- Options generated dynamically -->
                    </datalist>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button type="button" class="btn btn-secondary" id="saveAndContinueBtn" style="border: 1px solid var(--primary); color: var(--primary);">儲存並預留在本頁</button>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/zh-tw.js"></script>
    <script>
        const todayDate = new Date().toLocaleDateString('en-CA'); // 'yyyy-mm-dd' format locally
        // Initial Mock Data from Google Sheet
        const initialData = [
            { id: 1, date: todayDate, name: "高念平", meal: "3.排骨特餐", drink: "A.青四季春無糖微冰" },
            { id: 2, date: todayDate, name: "游國楷", meal: "3.排骨特餐", drink: "C.珍珠奶茶微糖微冰" },
            { id: 3, date: todayDate, name: "謝楷評", meal: "2.雞腿特餐", drink: "B.紅柚翡翠微糖微冰" },
            { id: 4, date: todayDate, name: "陳春惠", meal: "2.雞腿特餐", drink: "B.紅柚翡翠微糖微冰" },
            { id: 5, date: todayDate, name: "薛仁奇", meal: "4.叉燒特餐", drink: "B.紅柚翡翠微糖微冰" },
            { id: 6, date: todayDate, name: "劉道鈞", meal: "3.排骨特餐", drink: "C.珍珠奶茶微糖微冰" },
            { id: 7, date: todayDate, name: "蔡恩傑", meal: "1.總匯特餐", drink: "B.紅柚翡翠微糖微冰" },
            { id: 8, date: todayDate, name: "李國源", meal: "5.素食", drink: "A.青四季春無糖微冰" }
        ];

        // GAS API 網址 (填入您部署的行事曆 App Script 網址)
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwaWwvuxfXH8z2ARI-x4JMmSpRPnG_m8PEyGqpen6e0Q9_U8B85SJdIRV3UGdj8bD-T/exec'; // 範例: 'https://script.google.com/macros/s/.../exec'
        const SHEET_ID = '1VOufUmfDeufKGmk0A053PnCWpO7Mt_0xhuI3-eCTJII';
        
        // State Management
        let orders = [];
        let nextId = 1;
        let datePicker;
        let modalDatePicker;
        
        // Pagination state
        let currentPage = 1;
        const ITEMS_PER_PAGE = 40;

        // Initialize state
        async function init() {
            // Set default date filter with flatpickr
            datePicker = flatpickr("#dateFilter", {
                locale: "zh_tw"
            });
            
            modalDatePicker = flatpickr("#orderDate", {
                defaultDate: "today",
                locale: "zh_tw"
            });
            
            const savedOrders = localStorage.getItem('orderMealData_v3');
            if (savedOrders) {
                orders = JSON.parse(savedOrders);
                nextId = orders.length > 0 ? Math.max(...orders.map(o => parseInt(o.id))) + 1 : 1;
            } else {
                orders = [...initialData];
                nextId = 9;
                saveData();
            }

            renderTable();
            setupEventListeners();
            
            // 若有設定 GAS_URL，則嘗試從遠端重新拉取資料
            if (GAS_URL) {
                syncDataFromGAS();
            }
        }

        async function syncDataFromGAS() {
            try {
                // 直接讀取 Google Sheets 公開 JSON (避免 GAS Cache 或未部署問題)
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
                const text = await response.text();
                // 解析 Google Visualization 的 JSON 格式
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);

                if (data && data.table && data.table.rows) {
                    orders = data.table.rows.map(row => {
                        const r = row.c;
                        let d = todayDate;
                        if (r[1] && r[1].f) {
                            d = String(r[1].f).replace(/\//g, '-');
                        } else if (r[1] && r[1].v) {
                            const match = String(r[1].v).match(/Date\((\d+),(\d+),(\d+)/);
                            if (match) {
                                d = match[1] + '-' + String(parseInt(match[2]) + 1).padStart(2, '0') + '-' + String(match[3]).padStart(2, '0');
                            }
                        }
                        return {
                            id: r[0] ? (r[0].v || r[0].f) : '',
                            date: d,
                            name: r[2] && r[2].v ? r[2].v : '',
                            meal: r[3] && r[3].v ? r[3].v : '',
                            drink: r[4] && r[4].v ? r[4].v : ''
                        };
                    }).filter(o => o.id && String(o.id).trim() !== '');

                    nextId = orders.length > 0 ? Math.max(...orders.map(o => parseInt(o.id) || 0)) + 1 : 1;
                    saveData();
                    renderTable(document.getElementById('searchInput').value);
                }
            } catch (error) {
                console.error('從 Sheet 同步資料失敗:', error);
            }
        }

        // Save to LocalStorage to simulate persistence
        function saveData() {
            localStorage.setItem('orderMealData_v3', JSON.stringify(orders));
        }

        // Color helper for meal badges
        function getMealColor(meal) {
            if (!meal) return '';
            if (meal.includes('雞腿')) return 'background: rgba(239, 68, 68, 0.2); color: #f87171;';
            if (meal.includes('排骨')) return 'background: rgba(245, 158, 11, 0.2); color: #fbbf24;';
            if (meal.includes('素食')) return 'background: rgba(16, 185, 129, 0.2); color: #34d399;';
            if (meal.includes('叉燒')) return 'background: rgba(244, 114, 182, 0.2); color: #f472b6;';
            return 'background: rgba(99, 102, 241, 0.2); color: #818cf8;';
        }

        function getMenuItems() {
            const defaultMeals = ["1.總匯特餐", "2.雞腿特餐", "3.排骨特餐", "4.叉燒特餐", "5.素食"];
            const defaultDrinks = ["A.青四季春無糖微冰", "B.紅柚翡翠微糖微冰", "C.珍珠奶茶微糖微冰", "無"];
            const saved = localStorage.getItem('orderMealMenuItems_v1');
            if (saved) {
                const parsed = JSON.parse(saved);
                return { meals: parsed.meals || defaultMeals, drinks: parsed.drinks || defaultDrinks };
            }
            // Initialize defaults into shared key if not yet set
            const initial = { meals: defaultMeals, drinks: defaultDrinks };
            localStorage.setItem('orderMealMenuItems_v1', JSON.stringify(initial));
            return initial;
        }

        function updateDataLists() {
            const { meals, drinks } = getMenuItems();
            document.getElementById('mealOptions').innerHTML = meals.map(m => `<option value="${m}">`).join('');
            document.getElementById('drinkOptions').innerHTML = drinks.map(d => `<option value="${d}">`).join('');
        }

        // Render Table
        function renderTable(filterText = '') {
            updateDataLists();
            
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const pagination = document.getElementById('pagination');
            tbody.innerHTML = '';
            
            const selectedDate = document.getElementById('dateFilter').value;

            const filteredOrders = orders.filter(order => {
                // filter by date
                if (selectedDate && order.date !== selectedDate) {
                    return false;
                }
                const search = filterText.toLowerCase();
                return order.name.toLowerCase().includes(search) ||
                       order.meal.toLowerCase().includes(search) ||
                       (order.drink && order.drink.toLowerCase().includes(search));
            });
            
            const totalPages = Math.ceil(filteredOrders.length / ITEMS_PER_PAGE) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const paginatedOrders = filteredOrders.slice(startIndex, startIndex + ITEMS_PER_PAGE);

            if (paginatedOrders.length === 0) {
                emptyState.style.display = 'block';
                pagination.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                paginatedOrders.forEach(order => {
                    const tr = document.createElement('tr');
                    const mealStyle = getMealColor(order.meal);
                    tr.innerHTML = `
                        <td>${order.id}</td>
                        <td>${order.date || '-'}</td>
                        <td><div style="font-weight: 500;">${order.name}</div></td>
                        <td><span class="meal-tag" style="${mealStyle}">${order.meal}</span></td>
                        <td>${order.drink || '<span style="color: var(--text-muted)">-</span>'}</td>
                        <td class="action-cell">
                            <button class="btn btn-edit" onclick="editOrder(${order.id})">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                編輯
                            </button>
                            <button class="btn btn-delete" onclick="deleteOrder(${order.id})">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                刪除
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                renderPaginationControls(totalPages);
            }
        }
        
        function renderPaginationControls(totalPages) {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }
            pagination.style.display = 'flex';
            pagination.innerHTML = '';
            
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '上一頁';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { currentPage--; renderTable(document.getElementById('searchInput').value); };
            pagination.appendChild(prevBtn);
            
            // Generate limited pagination if there are many pages but for this case showing all is fine or max 5 pages
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) {
                startPage = Math.max(1, endPage - 4);
            }

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                if (i === currentPage) pageBtn.classList.add('active');
                pageBtn.onclick = () => { currentPage = i; renderTable(document.getElementById('searchInput').value); };
                pagination.appendChild(pageBtn);
            }
            
            const nextBtn = document.createElement('button');
            nextBtn.textContent = '下一頁';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => { currentPage++; renderTable(document.getElementById('searchInput').value); };
            pagination.appendChild(nextBtn);
        }

        // Additional event listeners for setupEventListeners()
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentPage = 1;
                renderTable(e.target.value);
            });
            document.getElementById('confirmDateBtn').addEventListener('click', () => {
                currentPage = 1;
                renderTable(document.getElementById('searchInput').value);
            });
            document.getElementById('allDatesBtn').addEventListener('click', () => {
                datePicker.clear();
                currentPage = 1;
                renderTable(document.getElementById('searchInput').value);
            });
        }

        // Modal Elements
        const modal = document.getElementById('formModal');
        const orderForm = document.getElementById('orderForm');
        const modalTitle = document.getElementById('modalTitle');
        const addBtn = document.getElementById('addBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        // Custom Inputs
        const mealInput = document.getElementById('meal');
        const drinkInput = document.getElementById('drink');

        function openModal(isEdit = false) {
            modal.classList.add('active');
            if (!isEdit) {
                modalTitle.textContent = '新增訂單';
                orderForm.reset();
                document.getElementById('orderId').value = '';
                // Default orderDate to selected date filter or today
                const filterDate = document.getElementById('dateFilter').value;
                modalDatePicker.setDate(filterDate || todayDate);
                
                document.getElementById('saveAndContinueBtn').style.display = 'inline-block';
            } else {
                document.getElementById('saveAndContinueBtn').style.display = 'none';
            }
            document.body.style.overflow = 'hidden';
            
            // Focus on name input for faster entry
            setTimeout(() => {
                document.getElementById('name').focus();
            }, 100);
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        addBtn.addEventListener('click', () => openModal(false));
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);

        // Close on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Form Submit
        async function handleFormSubmit(isContinue = false) {
            const id = document.getElementById('orderId').value;
            const date = document.getElementById('orderDate').value;
            const name = document.getElementById('name').value;

            let meal = mealInput.value.trim();
            // Simple validation since form is not submitted natively if we call this directly from button click
            if (!date || !name || !meal) {
                alert("請填寫必填欄位：日期、姓名、餐點");
                return;
            }
            
            let drink = drinkInput.value.trim();
            if (drink === '無') drink = '';

            let payload = {};

            if (id) {
                // Edit
                const index = orders.findIndex(o => o.id == id);
                if (index !== -1) {
                    orders[index] = { ...orders[index], date, name, meal, drink };
                    payload = { action: 'edit', id, date, name, meal, drink };
                    alert('資料修改成功！' + (GAS_URL ? ' (同步中)' : ''));
                }
            } else {
                // Add
                const newId = nextId++;
                orders.push({ id: newId, date, name, meal, drink });
                payload = { action: 'add', id: newId, date, name, meal, drink };
                // Toast notification substitute simply setting timeout for aesthetics can be done 
            }

            // 本機畫面先行更新
            saveData();
            renderTable(document.getElementById('searchInput').value);

            if (GAS_URL) {
                fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).catch(console.error);
            }

            if (isContinue && !id) {
                // Keep modal open, reset only name to allow rapid fire entry
                document.getElementById('name').value = '';
                document.getElementById('name').focus();
            } else {
                closeModal();
            }
        }

        orderForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleFormSubmit(false);
        });
        
        document.getElementById('saveAndContinueBtn').addEventListener('click', (e) => {
            // Need to manually check required fields since we bypass default submit via button type="button"
            if(orderForm.checkValidity()) {
                 handleFormSubmit(true);
            } else {
                 orderForm.reportValidity();
            }
        });

        // Edit function
        window.editOrder = function(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;

            document.getElementById('orderId').value = order.id;
            modalDatePicker.setDate(order.date || todayDate);
            document.getElementById('name').value = order.name;
            // Set Meal and Drink
            mealInput.value = order.meal || '';
            drinkInput.value = order.drink || '';

            modalTitle.textContent = '編輯訂單 (編號: ' + order.id + ')';
            openModal(true);
        };

        // Delete function
        window.deleteOrder = async function(id) {
            if (confirm('確定要刪除這筆訂單嗎？此動作無法復原。')) {
                // 先更新本地
                orders = orders.filter(o => o.id !== id);
                saveData();
                renderTable(document.getElementById('searchInput').value);
                
                // 再同步到 GAS
                if (GAS_URL) {
                    try {
                        await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'delete', id: id })
                        });
                    } catch (err) {
                        console.error('同步刪除至 GAS 失敗', err);
                    }
                }
            }
        };

        // Initialize application
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
